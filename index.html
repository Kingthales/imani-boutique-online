<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imani Boutique - Online Store</title>
    <style>
        /* Modern & Elegant Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }
        body { background: #121212; color: #ffffff; padding-bottom: 60px; }
        
        /* Header */
        header { background: #1a1a1a; padding: 20px; text-align: center; border-bottom: 2px solid #ffaa00; position: sticky; top: 0; z-index: 100; }
        header h1 { color: #ffaa00; font-size: 24px; letter-spacing: 2px; }
        header p { color: #aaa; font-size: 12px; margin-top: 5px; }

        /* Store Layout */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        
        /* Live Products Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* Product Card */
        .product-card { background: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a2a; padding: 15px; text-align: center; transition: transform 0.3s, border-color 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: #ffaa00; }
        
        .product-img-box { width: 100%; height: 200px; background: #2a2a2a; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-title { font-size: 16px; margin: 10px 0 5px 0; color: #fff; font-weight: 500; }
        .price { color: #ffaa00; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        
        .btn-add { background: transparent; color: #ffaa00; border: 2px solid #ffaa00; padding: 8px 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: #ffaa00; color: #000; }

        /* Admin link floating */
        .admin-float { position: fixed; bottom: 20px; right: 20px; background: #ffaa00; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>IMANI BOUTIQUE</h1>
        <p>Ibicuruzwa Byiza Ku Giciro Cyiza</p>
    </header>

    <div class="container">
        <!-- Iyi div niyo script.js izazanamo ibicuruzwa byose bya database live -->
        <div class="product-grid">
            <p style="text-align: center; color: #aaa; width: 100%;">Ibicuruzwa biracyashakishwa...</p>
        </div>
    </div>

    <!-- Floating Admin Button kuko turi kuri Mobile Chrome -->
    <a href="admin.html" class="admin-float">Go to Admin Panel</a>

    <!-- Firebase SDKs to load live online data -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
